x-app-build-args: &app-build-args
  NODE_ENV: production
  NEXTAUTH_URL: ${NEXTAUTH_URL:?Set NEXTAUTH_URL in .env}
  APP_URL: ${APP_URL:?Set APP_URL in .env}
  NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?Set NEXT_PUBLIC_APP_URL in .env}
  NEXT_PUBLIC_TELEGRAM_LOGIN_BOT_NAME: ${NEXT_PUBLIC_TELEGRAM_LOGIN_BOT_NAME:-}
  NEXT_PUBLIC_TELEGRAM_AUTH_ENABLED: ${NEXT_PUBLIC_TELEGRAM_AUTH_ENABLED:-0}
  NEXT_PUBLIC_SSO_ENABLED: ${NEXT_PUBLIC_SSO_ENABLED:-1}

services:
  postgres:
    image: postgres:16
    container_name: platformaai-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-platformaai}
      POSTGRES_USER: ${POSTGRES_USER:-platformaai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platformaai} -d ${POSTGRES_DB:-platformaai}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args: *app-build-args
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/internal/readiness').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s

  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    profiles:
      - migrate
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: "no"

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: platformaai-pgadmin
    restart: unless-stopped
    profiles:
      - admin
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@platforma.ai}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?Set PGADMIN_PASSWORD in .env}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
