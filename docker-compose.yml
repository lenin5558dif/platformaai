services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platformaai-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      ADMIN_SECRETS_ENCRYPTION_KEY: ${ADMIN_SECRETS_ENCRYPTION_KEY:-}
      DATABASE_URL: postgresql://${POSTGRES_USER:-platformaai}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-platformaai}?schema=public
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:3000}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-PlatformaAI}
      OPENROUTER_MARKUP: ${OPENROUTER_MARKUP:-2}
      USD_PER_CREDIT: ${USD_PER_CREDIT:-0.01}
      # Payment provider config for the app layer.
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      YOOKASSA_RETURN_URL: ${YOOKASSA_RETURN_URL:-}
      YOOKASSA_WEBHOOK_SECRET: ${YOOKASSA_WEBHOOK_SECRET:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_LOGIN_BOT_NAME: ${TELEGRAM_LOGIN_BOT_NAME:-platformaai_bot}
      NEXT_PUBLIC_TELEGRAM_LOGIN_BOT_NAME: ${NEXT_PUBLIC_TELEGRAM_LOGIN_BOT_NAME:-platformaai_bot}
      NEXT_PUBLIC_TELEGRAM_AUTH_ENABLED: ${NEXT_PUBLIC_TELEGRAM_AUTH_ENABLED:-0}
      # SMTP is the primary mail path; fallback stays optional.
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-0}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-PlatformaAI}
      UNISENDER_API_KEY: ${UNISENDER_API_KEY:-}
      UNISENDER_SENDER_EMAIL: ${UNISENDER_SENDER_EMAIL:-}
      UNISENDER_SENDER_NAME: ${UNISENDER_SENDER_NAME:-PlatformaAI}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-whisper-1}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-ru}
      WHISPER_USD_PER_MINUTE: ${WHISPER_USD_PER_MINUTE:-0.006}
      CRON_SECRET: ${CRON_SECRET:-change-me-cron-secret}
      AUTH_BYPASS: 0

  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: platformaai-bot
    restart: unless-stopped
    profiles: ["bot"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-platformaai}:${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}@postgres:5432/${POSTGRES_DB:-platformaai}?schema=public
      AUTH_SECRET: ${AUTH_SECRET:?Set AUTH_SECRET in .env}
      ADMIN_SECRETS_ENCRYPTION_KEY: ${ADMIN_SECRETS_ENCRYPTION_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_SITE_URL: ${OPENROUTER_SITE_URL:-http://localhost:3000}
      OPENROUTER_APP_NAME: ${OPENROUTER_APP_NAME:-PlatformaAI}
      OPENROUTER_MARKUP: ${OPENROUTER_MARKUP:-2}
      USD_PER_CREDIT: ${USD_PER_CREDIT:-0.01}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_LOGIN_BOT_NAME: ${TELEGRAM_LOGIN_BOT_NAME:-platformaai_bot}
      # Payment provider config for the bot layer.
      YOOKASSA_SHOP_ID: ${YOOKASSA_SHOP_ID:-}
      YOOKASSA_SECRET_KEY: ${YOOKASSA_SECRET_KEY:-}
      YOOKASSA_RETURN_URL: ${YOOKASSA_RETURN_URL:-}
      YOOKASSA_WEBHOOK_SECRET: ${YOOKASSA_WEBHOOK_SECRET:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      WHISPER_MODEL: ${WHISPER_MODEL:-whisper-1}
      WHISPER_LANGUAGE: ${WHISPER_LANGUAGE:-ru}
      WHISPER_USD_PER_MINUTE: ${WHISPER_USD_PER_MINUTE:-0.006}
      AUTH_BYPASS: 0
    command: ["/app/scripts/docker/start-bot.sh"]

  postgres:
    image: postgres:16
    container_name: platformaai-postgres
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-platformaai}
      POSTGRES_USER: ${POSTGRES_USER:-platformaai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platformaai} -d ${POSTGRES_DB:-platformaai}"]
      interval: 5s
      timeout: 5s
      retries: 20

  pgadmin:
    image: dpage/pgadmin4:8
    container_name: platformaai-pgadmin
    restart: unless-stopped
    profiles: ["tools"]
    ports:
      - "${PGADMIN_PORT:-5050}:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL:-admin@platforma.ai}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD:?Set PGADMIN_PASSWORD in .env}
    depends_on:
      - postgres

volumes:
  postgres_data:
